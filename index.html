<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>tvShow app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="tvShow-container">
        <h1>TVshow App</h1>

        <div class="input-group">

            <input type="text" id="tvShow" placeholder="Enter TV show name">
            <button id="searchBtn">Search</button>

        </div>
         <p id="loading"></p>

        <p id="error"></p>
        <div class="show-details" id="myDiv">
            <img id="showPoster" alt="TV Show Poster">
            <p id="showTitle">Title</p>
            <p id="showYear">Year</p>
            <p id="showGenre">Genre</p>
            <p id="showRating">Rating</p>
            <p id="showSummary">Summary</p>
        </div>

       
       
    </div>

    <script src="script.js"></script>
</body>

</html>
